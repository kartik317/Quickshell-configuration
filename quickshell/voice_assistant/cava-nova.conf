[general]
mode = normal
framerate = 60
bars = 12
sleep_timer = 0

[input]
method = pulse
# "auto" reacts to whatever is playing on your default output.
# For Nova-only reactivity, set this to the monitor of the dedicated
# sink (see the pactl setup in the integration notes), e.g.:
#   source = nova_tts.monitor
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
monstercat = 0
waves = 0
noise_reduction = 65
